<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedSwin System Benchmark</title>
  <style>
    body { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background: #f6f7fb; color: #202336; }
    header { background: #202336; color: white; padding: 24px 32px; }
    main { max-width: 1100px; margin: 24px auto; padding: 0 20px; }
    .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 8px 24px rgba(20, 24, 40, .08); margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 700; margin-top: 12px; }
    input, select { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #d9ddea; border-radius: 10px; margin-top: 6px; }
    button { margin-top: 16px; background: #202336; color: white; border: 0; border-radius: 12px; padding: 12px 16px; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    pre { background: #0f172a; color: #dbeafe; padding: 16px; border-radius: 12px; overflow: auto; max-height: 520px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .metric { background: #f6f7fb; border-radius: 14px; padding: 14px; }
    .metric strong { font-size: 24px; display: block; margin-top: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>MedSwin End-to-End System Benchmark</h1>
    <p>Facet, provenance, sufficiency, safety, and audit-trace evaluation for the full MedSwin pipeline.</p>
  </header>
  <main>
    <section class="card">
      <h2>Run benchmark</h2>
      <label>Cases JSONL path</label>
      <input id="casesPath" value="data/sample/cases.jsonl" />
      <label>Max cases</label>
      <input id="maxCases" type="number" value="2" min="1" />
      <label>Source policy</label>
      <select id="sourcePolicy">
        <option>ANY</option>
        <option>LIT_ONLY</option>
        <option>CPG_ONLY</option>
        <option>EMR_ONLY</option>
      </select>
      <label>Minimum evidence grade</label>
      <input id="minEvidenceGrade" type="number" value="0.3" min="0" max="1" step="0.05" />
      <button id="runBtn">Start audit run</button>
    </section>

    <section class="card">
      <h2>Aggregate result</h2>
      <div id="metrics" class="grid"></div>
    </section>

    <section class="card">
      <h2>Audit JSON</h2>
      <pre id="output">No run yet.</pre>
    </section>
  </main>
  <script>
    const runBtn = document.getElementById('runBtn');
    const output = document.getElementById('output');
    const metrics = document.getElementById('metrics');

    function metricCard(label, value) {
      const v = typeof value === 'number' ? value.toFixed(3) : String(value ?? 'n/a');
      return `<div class="metric"><span>${label}</span><strong>${v}</strong></div>`;
    }

    runBtn.onclick = async () => {
      runBtn.disabled = true;
      output.textContent = 'Running...';
      metrics.innerHTML = '';
      const payload = {
        cases_path: document.getElementById('casesPath').value,
        max_cases: Number(document.getElementById('maxCases').value),
        source_policy: document.getElementById('sourcePolicy').value,
        min_evidence_grade: Number(document.getElementById('minEvidenceGrade').value),
        ingest_case_context: true,
        guideline_only: false,
        clinical_scope: 'clinician_cds'
      };
      try {
        const resp = await fetch('/api/run', {
          method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
        });
        const data = await resp.json();
        output.textContent = JSON.stringify(data, null, 2);
        const agg = data.aggregate || {};
        metrics.innerHTML = [
          metricCard('Mean MSAS', agg.mean_msas),
          metricCard('Critical facet recall', agg.mean_critical_facet_recall),
          metricCard('Evidence doc recall', agg.mean_evidence_doc_recall),
          metricCard('Trace completeness', agg.mean_trace_completeness),
          metricCard('Unsafe omission penalty', agg.mean_unsafe_omission_penalty),
          metricCard('Error rate', agg.error_rate)
        ].join('');
      } catch (err) {
        output.textContent = String(err);
      } finally {
        runBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
